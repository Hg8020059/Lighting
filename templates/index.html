<!DOCTYPE html>
<html>
<head>
    <title>LED Color Picker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 50px; }
        input[type="color"] { 
            width: 80%; max-width: 300px; height: 200px; 
            border: none; cursor: pointer; background: none;
        }
        h1 { margin-bottom: 40px; }
    </style>
</head>
<body>
    <h1>Select LED Color</h1>
    <input type="color" id="picker" value="#00ff00">

    <script>
        const picker = document.getElementById('picker');
        
        // Using 'change' instead of 'input' so it only sends 
        // the command when you let go of the mouse/finger.
        picker.addEventListener('change', (e) => {
            fetch('/api/color', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ color: e.target.value })
            })
            .then(response => response.json())
            .then(data => console.log('Success:', data))
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
