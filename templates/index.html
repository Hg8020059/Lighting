<!DOCTYPE html>
<html>
<head>
    <title>LED Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 50px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        input[type="color"] { width: 300px; height: 150px; border: none; cursor: pointer; background: none; }
        input[type="range"] { width: 300px; cursor: pointer; }
        
        /* New Button Styles */
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #333;
            border: 2px solid #555;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover { background-color: #444; }
        button.active { background-color: #ff3333; border-color: #ff0000; }
    </style>
</head>
<body>
    <h1>LED Controller</h1>
    <div class="container">
        <div>
            <label>Color</label><br>
            <input type="color" id="picker" value="#00ff00">
        </div>
        <div>
            <label>Brightness</label><br>
            <input type="range" id="brightness" min="0" max="255" value="80">
        </div>
        
        <div>
            <button id="strobeBtn">Strobe: OFF</button>
        </div>
    </div>

    <script>
        const picker = document.getElementById('picker');
        const brightness = document.getElementById('brightness');
        const strobeBtn = document.getElementById('strobeBtn');
        
        // Track the toggle state
        let isStrobing = false;

        // Helper to send data to our API
        const sendUpdate = (endpoint, payload) => {
            fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => console.log('Success:', data))
            .catch(err => console.error('Error:', err));
        };

        picker.addEventListener('change', (e) => {
            sendUpdate('/api/color', { color: e.target.value });
        });

        brightness.addEventListener('change', (e) => {
            sendUpdate('/api/brightness', { brightness: parseInt(e.target.value) });
        });

        // New Button Event Listener
        strobeBtn.addEventListener('click', () => {
            isStrobing = !isStrobing; // Flip the state
            
            // Update the UI immediately
            if (isStrobing) {
                strobeBtn.classList.add('active');
                strobeBtn.innerText = 'Strobe: ON';
            } else {
                strobeBtn.classList.remove('active');
                strobeBtn.innerText = 'Strobe: OFF';
            }

            // Send the command to your new Flask endpoint
            sendUpdate('/api/strobe', { strobe: isStrobing });
        });
    </script>
</body>
</html>
